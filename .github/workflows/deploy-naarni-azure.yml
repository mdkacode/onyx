# ============================================================================
# Naarni — Build, Push to Docker Hub, Deploy to Azure VM
# ============================================================================
# Flow:
#   1. Push to main → triggers this workflow
#   2. Build 3 Docker images from your code
#   3. Push to Docker Hub (naarnimd/naarni-ai-*)
#   4. SSH into Azure VM → pull images → inject secrets → restart
#
# All credentials come from GitHub Secrets — never committed to code.
#
# GitHub Secrets required:
#   DOCKERHUB_USERNAME        — Docker Hub username (naarnimd)
#   DOCKERHUB_TOKEN           — Docker Hub access token
#   VM_HOST                   — Azure VM public IP
#   VM_USER                   — SSH username (naarni)
#   VM_SSH_KEY                — SSH private key
#   OAUTH_CLIENT_ID           — Azure AD app client ID
#   OAUTH_CLIENT_SECRET       — Azure AD app client secret
#   USER_AUTH_SECRET           — OIDC state token signing key
#   POSTGRES_PASSWORD          — Database password
#   S3_AWS_ACCESS_KEY_ID       — AWS S3 access key
#   S3_AWS_SECRET_ACCESS_KEY   — AWS S3 secret key
# ============================================================================

name: NaArNi Gyan - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Phase 1: Build and push Docker images to Docker Hub
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: backend/
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_ORG }}/naarni-ai-backend:${{ github.sha }}
            ${{ env.DOCKERHUB_ORG }}/naarni-ai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: web/
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_ORG }}/naarni-ai-web:${{ github.sha }}
            ${{ env.DOCKERHUB_ORG }}/naarni-ai-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Model Server
        uses: docker/build-push-action@v6
        with:
          context: backend/
          file: backend/Dockerfile.model_server
          push: true
          tags: |
            ${{ env.DOCKERHUB_ORG }}/naarni-ai-model-server:${{ github.sha }}
            ${{ env.DOCKERHUB_ORG }}/naarni-ai-model-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Phase 2: Deploy to Azure VM
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code (for config files)
        uses: actions/checkout@v4

      - name: Copy deployment configs to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "deployment/docker_compose/docker-compose.prod.yml,deployment/docker_compose/docker-compose.naarni.yml,deployment/docker_compose/.env.naarni-azure,deployment/docker_compose/.env.nginx.naarni,deployment/data/"
          target: /opt/naarni/
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/naarni/deployment/docker_compose

            # ── Build .env: merge config + secrets ──
            # IMPORTANT: Never use 'down -v' or remove volumes — data must persist
            cp .env.naarni-azure .env
            cp .env.nginx.naarni .env.nginx
            cat >> .env <<'SECRETS_EOF'
            OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}
            OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }}
            USER_AUTH_SECRET=${{ secrets.USER_AUTH_SECRET }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            S3_AWS_ACCESS_KEY_ID=${{ secrets.S3_AWS_ACCESS_KEY_ID }}
            S3_AWS_SECRET_ACCESS_KEY=${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
            SECRETS_EOF

            # ── Pull new images only (NO restart yet) ──
            echo "=== Pulling images ==="
            docker compose -f docker-compose.prod.yml -f docker-compose.naarni.yml pull api_server web_server background 2>&1 | tail -5

            # ── Safe rolling restart: NEVER touch DB/Redis/Vespa ──
            # Infrastructure (DB, Redis, Vespa) stays untouched — no restart, no recreate
            echo "=== Restarting app containers only (DB/Redis/Vespa untouched) ==="

            # Step 1: API server (runs migrations automatically on start)
            docker compose -f docker-compose.prod.yml -f docker-compose.naarni.yml up -d --no-deps --force-recreate api_server 2>&1 | tail -3

            # Wait for API to be healthy
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "  API healthy after ${i}0s"
                break
              fi
              sleep 10
            done

            # Step 2: Background workers
            docker compose -f docker-compose.prod.yml -f docker-compose.naarni.yml up -d --no-deps --force-recreate background 2>&1 | tail -3

            # Step 3: Web server
            docker compose -f docker-compose.prod.yml -f docker-compose.naarni.yml up -d --no-deps --force-recreate web_server 2>&1 | tail -3
            sleep 5

            # Step 4: Reload nginx (no recreate — just signal reload)
            docker exec onyx-nginx-1 nginx -s reload 2>/dev/null || \
              docker restart onyx-nginx-1 2>/dev/null

            echo ""
            echo "=== Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | sort
            echo ""
            free -h | head -3
            echo ""
            echo "Deploy complete: $(date)"

  # ──────────────────────────────────────────────────────────────────────────
  # Phase 3: Health check
  # ──────────────────────────────────────────────────────────────────────────
  health-check:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait for services to stabilize
        run: sleep 45

      - name: Health check
        run: |
          echo "Checking https://ai.naarni.com/api/health ..."
          for i in $(seq 1 15); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://ai.naarni.com/api/health" || echo "000")
            echo "  Attempt $i/15: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo ""
              echo "API is healthy!"
              curl -sk -o /dev/null -w "Frontend: HTTP %{http_code}\n" "https://ai.naarni.com"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: API not healthy after 2.5 minutes"
          exit 1
